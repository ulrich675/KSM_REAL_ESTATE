spring:
  application:
    name: ksm-real-estate-backend

  # Reactive PostgreSQL (R2DBC) - used by the application at runtime
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ksm_real_estate
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  # JDBC datasource - required only for Liquibase (does not support R2DBC directly)
  datasource:
    url: jdbc:postgresql://localhost:5432/ksm_real_estate
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  # Redis - Spring Boot 3.x namespace is spring.data.redis, NOT spring.redis
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false   # no Spring Data Redis repositories used, only ReactiveStringRedisTemplate
    elasticsearch:
      repositories:
        enabled: false   # no Spring Data Elasticsearch repositories used, only ReactiveElasticsearchOperations

  elasticsearch:
    uris: http://localhost:9200

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ksm-real-estate-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:ksmRealEstateDefaultSecretKeyForDev1234}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

kernel-core:
  base-url: ${KERNEL_CORE_BASE_URL:http://localhost:8080}
  client-id: ${KERNEL_CORE_CLIENT_ID:dev-platform-backend}
  api-key: ${KERNEL_CORE_API_KEY:dev-api-key}
  tenant-id: ${KERNEL_CORE_TENANT_ID:11111111-1111-1111-1111-111111111111}
  organization-id: ${KERNEL_CORE_ORGANIZATION_ID:22222222-2222-2222-2222-222222222222}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: INFO
    com.ksm.realestate: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ==================== DEV PROFILE ====================
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: INFO
    com.ksm.realestate: DEBUG

---
# ==================== TEST PROFILE ====================
spring:
  config:
    activate:
      on-profile: test
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ksm_real_estate_test
  datasource:
    url: jdbc:postgresql://localhost:5432/ksm_real_estate_test
  liquibase:
    enabled: true
logging:
  level:
    root: WARN
    com.ksm.realestate: INFO

---
# ==================== PROD PROFILE ====================
spring:
  config:
    activate:
      on-profile: prod
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/ksm_real_estate}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/ksm_real_estate}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
security:
  jwt:
    secret: ${JWT_SECRET}
logging:
  level:
    root: WARN
    com.ksm.realestate: INFO