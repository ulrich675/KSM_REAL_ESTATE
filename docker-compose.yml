# docker-compose.yml — KSM Real Estate Full Stack
# Author: ulrich675
# Date: 2026-07-13
#
# Usage: docker-compose up --build
# Services: PostgreSQL · Redis · Elasticsearch · Kafka · Backend · Frontend

version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ksm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ksm_real_estate
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ksm_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ksm_redis
    restart: unless-stopped
    networks:
      - ksm_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ksm_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ksm_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Zookeeper ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.4
    container_name: ksm_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ksm_net

  # ─── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.4
    container_name: ksm_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ksm_net

  # ─── Backend Spring Boot ───────────────────────────────────
  backend:
    build:
      context: ./KSM_REAL_ESTATE_backend
      dockerfile: Dockerfile
    container_name: ksm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      R2DBC_URL: r2dbc:postgresql://postgres:5432/ksm_real_estate
      JDBC_URL: jdbc:postgresql://postgres:5432/ksm_real_estate
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Elasticsearch
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET:-ksmRealEstateSecretForProductionChangeMe}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Kernel-Core
      KERNEL_CORE_BASE_URL: ${KERNEL_CORE_BASE_URL}
      KERNEL_CORE_CLIENT_ID: ${KERNEL_CORE_CLIENT_ID}
      KERNEL_CORE_API_KEY: ${KERNEL_CORE_API_KEY}
      KERNEL_CORE_TENANT_ID: ${KERNEL_CORE_TENANT_ID}
      KERNEL_CORE_ORGANIZATION_ID: ${KERNEL_CORE_ORGANIZATION_ID:-}
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ksm-logs:/app/logs
      - ./backend-storage/receipts:/app/receipts
      - ./backend-storage/virtual-tours:/app/virtual-tours
    networks:
      - ksm_net

  # ─── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ./KSM_REAL_ESTATE_V
      dockerfile: Dockerfile
      args:
        # The backend URL used at build-time for Next.js rewrites
        BACKEND_URL: http://backend:8080
    container_name: ksm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_APP_TITLE: KSM Real Estate
      # For Next.js rewrite proxy at runtime:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - ksm_net

# ─── Volumes persistants ──────────────────────────────────────
volumes:
  postgres_data:
  es_data:
  postgres-data:
  es-data:
  ksm-logs:

    # ─── Réseau interne ──────────────────────────────────────────
networks:
  ksm_net:
    driver: bridge
